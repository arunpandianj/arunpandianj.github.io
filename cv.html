<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CV — Dr. Arun Pandian J</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800">
  <!-- Navbar -->
  <nav class="bg-gray-900 text-white fixed w-full z-10 top-0 shadow">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="index.html" class="text-xl font-bold">Arun Pandian J</a>

      <!-- Hamburger Button -->
      <button id="menu-btn" class="md:hidden block focus:outline-none">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <!-- Menu -->
      <div id="menu" class="hidden md:flex space-x-4 flex-col md:flex-row absolute md:static top-14 left-0 w-full md:w-auto bg-gray-900 md:bg-transparent p-4 md:p-0">
        <a href="index.html" class="block py-2 px-2 hover:text-yellow-400">Home</a>
        <a href="cv.html" class="block py-2 px-2 hover:text-yellow-400">CV</a>
        <a href="publications.html" class="block py-2 px-2 hover:text-yellow-400">Publications</a>
        <a href="patents.html" class="block py-2 px-2 hover:text-yellow-400">Patents</a>
        <a href="certifications.html" class="block py-2 px-2 hover:text-yellow-400">Certifications</a>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="max-w-4xl mx-auto mt-28 p-6 bg-white shadow rounded text-center">
    <h1 class="text-3xl font-bold">Download CV</h1>
    <p class="mt-4">Full academic CV (detailed publications, conferences, patents, and complete profile)</p>
    <div class="mt-6">
      <!-- Ensure cv.pdf is uploaded to the repo root -->
      <a href="cv.pdf" class="inline-block bg-blue-600 text-white px-6 py-3 rounded shadow hover:bg-blue-700" download>
        Download CV (PDF)
      </a>
    </div>

    <section class="mt-8 text-left">
      <h2 class="text-2xl font-semibold">Quick Links</h2>
      <ul class="list-disc ml-6 mt-3 space-y-2">
        <li><a href="publications.html" class="text-blue-600 underline">Publications</a></li>
        <li><a href="patents.html" class="text-blue-600 underline">Patents</a></li>
        <li><a href="certifications.html" class="text-blue-600 underline">Certifications</a></li>
      </ul>
    </section>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-white text-center p-6 mt-8">
    <p>© 2025 Arun Pandian J — Built for GitHub Pages</p>
  </footer>

  <!-- JS for Mobile Menu -->
  <script>
    const btn = document.getElementById('menu-btn');
    const menu = document.getElementById('menu');
    btn.addEventListener('click', () => {
      menu.classList.toggle('hidden');
    });
  </script>
</body>
</html>
